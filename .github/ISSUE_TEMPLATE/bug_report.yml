name: Bug report
description: Report a failing test, flaky behavior, or a defect in the framework.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Test X fails on chromium with ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands and conditions.
      placeholder: |
        1. npm run test:api
        2. ...
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version (.app-version)
      description: Which demo-shop-app tag was the suite running against?
      placeholder: v1.1.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, local vs CI.
      placeholder: Ubuntu, Node 22, CI (Playwright container)
