name: Feature / improvement
description: Propose a new test layer, capability, or CI/CD improvement.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What is missing or could be better? Link a ROADMAP item if relevant.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you build, and where would it live in the layered structure?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches and why this one wins (becomes the ADR "Alternatives" section).
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which repo does this touch?
      options:
        - playwright-typescript (this repo)
        - demo-shop-app (the SUT)
        - both
