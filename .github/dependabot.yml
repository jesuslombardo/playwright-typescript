version: 2
updates:
  # JavaScript / npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels: ['dependencies']
    commit-message:
      prefix: 'chore(deps)'
    # One grouped PR for routine bumps instead of one PR per package (less noise).
    groups:
      npm-dependencies:
        patterns: ['*']

  # GitHub Actions used in our workflows
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    labels: ['ci']
    commit-message:
      prefix: 'chore(ci)'
    groups:
      github-actions:
        patterns: ['*']
