name: Release

# Automated, Conventional-Commit-driven releases via release-please.
# On each push to main it maintains a "release PR" that bumps the version and
# CHANGELOG.md from the commit history; merging that PR tags the version and
# publishes a GitHub Release. The release PR goes through the same required
# checks as any other PR — which is exactly why this fits a protected `main`
# (unlike a bot pushing version commits straight to it). See ADR-022.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived token from our GitHub App so the release PR is opened by a
      # non-GITHUB_TOKEN identity — that is what makes its required checks run (and lets
      # it merge on a protected `main`). Unlike a PAT there is nothing to renew: the
      # token is regenerated on every run. See ADR-022.
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      # Manifest-driven (release-please-config.json + .release-please-manifest.json).
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
