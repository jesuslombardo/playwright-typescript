name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Injected into the SUT via playwright.config.ts webServer.env. Demonstrates the
# secrets pattern: a real secret (the JWT signing key) in CI, default locally.
env:
  JWT_SECRET: ${{ secrets.JWT_SECRET }}

jobs:
  quality:
    name: Lint and format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  # ── Testing pyramid: API first (cheap, fail-fast), then E2E. ──────────────
  # Every test job spins up the System Under Test (demo-shop-app) ephemerally:
  # it lives in its own repo, so we check it out into ./app and Playwright's
  # webServer starts it from source (see playwright.config.ts).

  # Matrix (compatibility): run the FULL api suite once per Node version, in
  # parallel. This is COVERAGE, not speed — unlike sharding (which splits one
  # suite across machines), each job here runs every test, just on a different
  # Node. Didactic at our scale (the app targets Node 22), but it's the real
  # pattern a published library uses to catch "works on my Node, breaks on
  # yours". The matrix renames the check → API tests (22) / (24). See ADR-009.
  api:
    name: API tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]

    steps:
      - name: Checkout testing repository
        uses: actions/checkout@v7

      # Cross-repo version pin: test against a FIXED app tag (.app-version),
      # not a moving @main, so CI is reproducible. Bump = a deliberate PR that
      # edits .app-version. See ADR-013.
      - name: Resolve pinned app version
        run: echo "APP_VERSION=$(tr -d '[:space:]' < .app-version)" >> "$GITHUB_ENV"

      - name: Checkout demo-shop-app (System Under Test) at pinned version
        uses: actions/checkout@v7
        with:
          repository: jesuslombardo/demo-shop-app
          ref: ${{ env.APP_VERSION }}
          path: app

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install testing dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Run API tests
        run: npm run test:api

      - name: Upload API debug bundle on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: api-debug-node${{ matrix.node }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # ── Alternative SUT strategy: the PUBLISHED image as a service container ───
  # The `api`/`smoke`/`regression` jobs check out the app source and build it
  # ("test from source", zero infra). This pair shows the other industry option:
  # pull the app's PUBLISHED Docker image from GHCR and run it as a service
  # container — "test the artifact you actually ship". Both are kept on purpose
  # to teach the trade-off; see ADR-006.
  #
  # Reproducible like the rest: the image is pinned to the SAME commit as
  # .app-version. The app's CI tags images by commit SHA, so we resolve the
  # v1.0.0 tag → its SHA (one source of truth, ADR-013) and pin to that.
  # DIDACTIC — this job is intentionally NOT a required check.
  resolve-app-image:
    name: Resolve app image tag
    needs: quality
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}

    steps:
      - name: Checkout testing repository
        uses: actions/checkout@v7

      - name: Resolve .app-version tag to the image's commit SHA
        id: resolve
        run: |
          APP_VERSION=$(tr -d '[:space:]' < .app-version)
          APP_REPO=https://github.com/jesuslombardo/demo-shop-app
          # Annotated tags expose a peeled ^{} ref (the commit); lightweight tags
          # (e.g. the ones release-please creates) don't — fall back to the tag
          # itself, which already points straight at the commit.
          SHA=$(git ls-remote "$APP_REPO" "refs/tags/${APP_VERSION}^{}" | cut -f1)
          if [ -z "$SHA" ]; then
            SHA=$(git ls-remote "$APP_REPO" "refs/tags/${APP_VERSION}" | cut -f1)
          fi
          if [ -z "$SHA" ]; then
            echo "Could not resolve $APP_VERSION to a commit SHA" >&2
            exit 1
          fi
          echo "tag=$SHA" >> "$GITHUB_OUTPUT"
          echo "Pinned image: ghcr.io/jesuslombardo/demo-shop-app:$SHA ($APP_VERSION)"

  api-via-image:
    name: API tests (via published image)
    needs: [quality, resolve-app-image]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Start the SUT from its published image. No `credentials:` needed — the
    # package is public, so the runner pulls it anonymously.
    services:
      app:
        image: ghcr.io/jesuslombardo/demo-shop-app:${{ needs.resolve-app-image.outputs.tag }}
        ports:
          - 3000:3000
        # The app signs/verifies JWTs with this key; empty on forks → the image
        # falls back to its built-in default, so the suite still passes.
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - name: Checkout testing repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install testing dependencies
        run: npm ci

      - name: Wait for the published app to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null; then
              echo "app is up"; exit 0
            fi
            echo "waiting for app... ($i)"; sleep 2
          done
          echo "app did not become healthy in time" >&2
          exit 1

      # No webServer here: BASE_URL points Playwright at the running service.
      - name: Run API tests against the published image
        env:
          BASE_URL: http://localhost:3000
        run: npm run test:api

      - name: Upload API (image) debug bundle on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: api-via-image-debug
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # ── Consumer-driven contract test (Pact) ──────────────────────────────────
  # The shop-web CONSUMER declares what it needs from auth-service's /api/login;
  # Pact runs the real client (utils/auth-client) against a mock and regenerates
  # pacts/shop-web-auth-service.json. The PROVIDER side verifies that pact in the
  # app's own CI (demo-shop-app). Browserless, no SUT needed (NO_WEBSERVER).
  # DIDACTIC — intentionally NOT a required check. See ADR-017.
  contract:
    name: Contract (Pact consumer)
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout testing repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install testing dependencies
        run: npm ci

      - name: Run the consumer contract test (regenerates the pact)
        run: npm run test:contract

  smoke:
    name: Smoke
    needs: api
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy
      options: --user 1001
    timeout-minutes: 15

    steps:
      - name: Checkout testing repository
        uses: actions/checkout@v7

      # Cross-repo version pin: test against a FIXED app tag (.app-version),
      # not a moving @main, so CI is reproducible. Bump = a deliberate PR that
      # edits .app-version. See ADR-013.
      - name: Resolve pinned app version
        run: echo "APP_VERSION=$(tr -d '[:space:]' < .app-version)" >> "$GITHUB_ENV"

      - name: Checkout demo-shop-app (System Under Test) at pinned version
        uses: actions/checkout@v7
        with:
          repository: jesuslombardo/demo-shop-app
          ref: ${{ env.APP_VERSION }}
          path: app

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install testing dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Upload smoke debug bundle on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-debug
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # Sharding: split the regression suite across N parallel machines, each
  # running --shard=i/N with the blob reporter; merge-reports then stitches the
  # shards' blobs into one HTML report. NOTE: with ~15 fast tests this is
  # DIDACTIC — setup (~36s/job) dwarfs the tests (~21s), so it's slower + costs
  # ~2x here; it pays off once the suite takes many minutes. See ADR-008.
  regression:
    name: Regression
    needs: smoke
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy
      options: --user 1001
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - name: Checkout testing repository
        uses: actions/checkout@v7

      # Cross-repo version pin: test against a FIXED app tag (.app-version),
      # not a moving @main, so CI is reproducible. Bump = a deliberate PR that
      # edits .app-version. See ADR-013.
      - name: Resolve pinned app version
        run: echo "APP_VERSION=$(tr -d '[:space:]' < .app-version)" >> "$GITHUB_ENV"

      - name: Checkout demo-shop-app (System Under Test) at pinned version
        uses: actions/checkout@v7
        with:
          repository: jesuslombardo/demo-shop-app
          ref: ${{ env.APP_VERSION }}
          path: app

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install testing dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Run regression shard (E2E)
        run: npm run test:regression -- --shard=${{ matrix.shard }}/${{ strategy.job-total }} --reporter=blob

      - name: Upload this shard's blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    name: Merge reports
    needs: regression
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout testing repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install testing dependencies
        run: npm ci

      - name: Download blob reports from all shards
        uses: actions/download-artifact@v8
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge blobs into a single HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload report for GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: playwright-report/

  deploy-report:
    name: Publish report (CD)
    needs: merge-reports
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Playwright report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
