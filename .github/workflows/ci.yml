name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

      # TEMP: prove the secret reaches the runner (remove after demo)
      - name: (temp) Verify secret wiring
        env:
          SAUCE_STANDARD_PASSWORD: ${{ secrets.SAUCE_STANDARD_PASSWORD }}
        run: |
          if [ -n "$SAUCE_STANDARD_PASSWORD" ]; then
            echo "Secret IS set. Length: ${#SAUCE_STANDARD_PASSWORD} chars"
            echo "Trying to print the value: $SAUCE_STANDARD_PASSWORD"
          else
            echo "Secret NOT set -> code would fall back to the default"
          fi

  test:
    name: Playwright
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers + OS deps (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright OS deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run Playwright tests
        env:
          SAUCE_STANDARD_USER: ${{ secrets.SAUCE_STANDARD_USER }}
          SAUCE_STANDARD_PASSWORD: ${{ secrets.SAUCE_STANDARD_PASSWORD }}
        run: npm test

      - name: Upload debug bundle on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-debug
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Upload report for GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

  deploy-report:
    name: Publish report (CD)
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Playwright report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
