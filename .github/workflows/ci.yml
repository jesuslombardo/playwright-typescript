name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Injected into the SUT via playwright.config.ts webServer.env. Demonstrates the
# secrets pattern: a real secret (the JWT signing key) in CI, default locally.
env:
  JWT_SECRET: ${{ secrets.JWT_SECRET }}

jobs:
  quality:
    name: Lint and format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  # ── Testing pyramid: API first (cheap, fail-fast), then E2E. ──────────────
  # Every test job spins up the System Under Test (demo-shop-app) ephemerally:
  # it lives in its own repo, so we check it out into ./app and Playwright's
  # webServer starts it from source (see playwright.config.ts).

  # Matrix (compatibility): run the FULL api suite once per Node version, in
  # parallel. This is COVERAGE, not speed — unlike sharding (which splits one
  # suite across machines), each job here runs every test, just on a different
  # Node. Didactic at our scale (the app targets Node 22), but it's the real
  # pattern a published library uses to catch "works on my Node, breaks on
  # yours". The matrix renames the check → API tests (22) / (24). See ADR-009.
  api:
    name: API tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]

    steps:
      - name: Checkout testing repository
        uses: actions/checkout@v6

      # Cross-repo version pin: test against a FIXED app tag (.app-version),
      # not a moving @main, so CI is reproducible. Bump = a deliberate PR that
      # edits .app-version. See ADR-013.
      - name: Resolve pinned app version
        run: echo "APP_VERSION=$(tr -d '[:space:]' < .app-version)" >> "$GITHUB_ENV"

      - name: Checkout demo-shop-app (System Under Test) at pinned version
        uses: actions/checkout@v6
        with:
          repository: jesuslombardo/demo-shop-app
          ref: ${{ env.APP_VERSION }}
          path: app

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install testing dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Run API tests
        run: npm run test:api

      - name: Upload API debug bundle on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: api-debug-node${{ matrix.node }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  smoke:
    name: Smoke
    needs: api
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy
      options: --user 1001
    timeout-minutes: 15

    steps:
      - name: Checkout testing repository
        uses: actions/checkout@v6

      # Cross-repo version pin: test against a FIXED app tag (.app-version),
      # not a moving @main, so CI is reproducible. Bump = a deliberate PR that
      # edits .app-version. See ADR-013.
      - name: Resolve pinned app version
        run: echo "APP_VERSION=$(tr -d '[:space:]' < .app-version)" >> "$GITHUB_ENV"

      - name: Checkout demo-shop-app (System Under Test) at pinned version
        uses: actions/checkout@v6
        with:
          repository: jesuslombardo/demo-shop-app
          ref: ${{ env.APP_VERSION }}
          path: app

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install testing dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Upload smoke debug bundle on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-debug
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # Sharding: split the regression suite across N parallel machines, each
  # running --shard=i/N with the blob reporter; merge-reports then stitches the
  # shards' blobs into one HTML report. NOTE: with ~15 fast tests this is
  # DIDACTIC — setup (~36s/job) dwarfs the tests (~21s), so it's slower + costs
  # ~2x here; it pays off once the suite takes many minutes. See ADR-008.
  regression:
    name: Regression
    needs: smoke
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy
      options: --user 1001
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - name: Checkout testing repository
        uses: actions/checkout@v6

      # Cross-repo version pin: test against a FIXED app tag (.app-version),
      # not a moving @main, so CI is reproducible. Bump = a deliberate PR that
      # edits .app-version. See ADR-013.
      - name: Resolve pinned app version
        run: echo "APP_VERSION=$(tr -d '[:space:]' < .app-version)" >> "$GITHUB_ENV"

      - name: Checkout demo-shop-app (System Under Test) at pinned version
        uses: actions/checkout@v6
        with:
          repository: jesuslombardo/demo-shop-app
          ref: ${{ env.APP_VERSION }}
          path: app

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install testing dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Run regression shard (E2E)
        run: npm run test:regression -- --shard=${{ matrix.shard }}/${{ strategy.job-total }} --reporter=blob

      - name: Upload this shard's blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    name: Merge reports
    needs: regression
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout testing repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install testing dependencies
        run: npm ci

      - name: Download blob reports from all shards
        uses: actions/download-artifact@v7
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge blobs into a single HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload report for GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

  deploy-report:
    name: Publish report (CD)
    needs: merge-reports
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Playwright report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
