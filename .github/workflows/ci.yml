name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Injected into the SUT via playwright.config.ts webServer.env. Demonstrates the
# secrets pattern: a real secret (the JWT signing key) in CI, default locally.
env:
  JWT_SECRET: ${{ secrets.JWT_SECRET }}

jobs:
  quality:
    name: Lint and format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  # ── Testing pyramid: API first (cheap, fail-fast), then E2E. ──────────────
  # Every test job spins up the System Under Test (demo-shop-app) ephemerally:
  # it lives in its own repo, so we check it out into ./app and Playwright's
  # webServer starts it from source (see playwright.config.ts).

  api:
    name: API tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout testing repository
        uses: actions/checkout@v6

      - name: Checkout demo-shop-app (System Under Test)
        uses: actions/checkout@v6
        with:
          repository: jesuslombardo/demo-shop-app
          path: app

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install testing dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Run API tests
        run: npm run test:api

      - name: Upload API debug bundle on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: api-debug
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  smoke:
    name: Smoke
    needs: api
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy
      options: --user 1001
    timeout-minutes: 15

    steps:
      - name: Checkout testing repository
        uses: actions/checkout@v6

      - name: Checkout demo-shop-app (System Under Test)
        uses: actions/checkout@v6
        with:
          repository: jesuslombardo/demo-shop-app
          path: app

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install testing dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Upload smoke debug bundle on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-debug
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  regression:
    name: Regression
    needs: smoke
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy
      options: --user 1001
    timeout-minutes: 15

    steps:
      - name: Checkout testing repository
        uses: actions/checkout@v6

      - name: Checkout demo-shop-app (System Under Test)
        uses: actions/checkout@v6
        with:
          repository: jesuslombardo/demo-shop-app
          path: app

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install testing dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Run regression suite (E2E)
        run: npm run test:regression

      - name: Upload debug bundle on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-debug
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Upload report for GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

  deploy-report:
    name: Publish report (CD)
    needs: regression
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Playwright report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
